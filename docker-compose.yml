# App Store Scraper — GUI + REST + MCP, exposed via a Cloudflare Tunnel.
#
# Two services:
#   - app:        the Node server (GUI / REST / MCP) on an internal network.
#   - cloudflared: connects the tunnel and forwards the public hostname
#                  mcp.example.com to the app.
#
# The app is NOT published on a host port — only Cloudflare can reach it,
# and the bearer token (AUTH_TOKEN) protects /api and /mcp.
#
# Copy .env.example to .env and fill AUTH_TOKEN + TUNNEL_TOKEN before running:
#   docker compose up -d --build

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      PORT: 8080
      HOST: 0.0.0.0
      AUTH_TOKEN: ${AUTH_TOKEN:?set AUTH_TOKEN in .env}
      # Public HTTPS origin — used as the OAuth issuer for the claude.ai connector.
      PUBLIC_URL: ${PUBLIC_URL:?set PUBLIC_URL in .env (your public HTTPS origin)}
      # Optional dedicated signing secret (defaults to AUTH_TOKEN if unset).
      OAUTH_SIGNING_SECRET: ${OAUTH_SIGNING_SECRET:-}
      # Where DCR-registered OAuth clients are persisted (mounted volume).
      DATA_DIR: /data
    expose:
      - "8080"
    volumes:
      - oauth-data:/data
    networks:
      - internal
    # Uncomment to also reach the GUI locally at http://localhost:8080
    # ports:
    #   - "8080:8080"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?set TUNNEL_TOKEN in .env}
    depends_on:
      - app
    networks:
      - internal

volumes:
  oauth-data:

networks:
  internal:
    driver: bridge
